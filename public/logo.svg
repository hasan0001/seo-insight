<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" style="enable-background:new 0 0 30 30;">
  <defs>
    <style type="text/css">
      .bg{fill:#0071e3;}
      .node{fill:#ffffff;}
      .line{stroke:#ffffff;stroke-width:0.8;fill:none;opacity:0.6;}
    </style>
  </defs>
  <!-- Rounded square background -->
  <rect x="1.5" y="1.5" width="27" height="27" rx="6" class="bg"/>
  <!-- Brain/network nodes -->
  <circle cx="15" cy="8" r="2.2" class="node"/>
  <circle cx="9" cy="15" r="1.8" class="node"/>
  <circle cx="21" cy="15" r="1.8" class="node"/>
  <circle cx="15" cy="22" r="2.2" class="node"/>
  <circle cx="12" cy="11.5" r="1.2" class="node" opacity="0.7"/>
  <circle cx="18" cy="11.5" r="1.2" class="node" opacity="0.7"/>
  <circle cx="12" cy="18.5" r="1.2" class="node" opacity="0.7"/>
  <circle cx="18" cy="18.5" r="1.2" class="node" opacity="0.7"/>
  <!-- Network connections -->
  <line x1="15" y1="8" x2="12" y2="11.5" class="line"/>
  <line x1="15" y1="8" x2="18" y2="11.5" class="line"/>
  <line x1="12" y1="11.5" x2="9" y2="15" class="line"/>
  <line x1="18" y1="11.5" x2="21" y2="15" class="line"/>
  <line x1="9" y1="15" x2="12" y2="18.5" class="line"/>
  <line x1="21" y1="15" x2="18" y2="18.5" class="line"/>
  <line x1="12" y1="18.5" x2="15" y2="22" class="line"/>
  <line x1="18" y1="18.5" x2="15" y2="22" class="line"/>
  <line x1="12" y1="11.5" x2="18" y2="11.5" class="line"/>
  <line x1="12" y1="18.5" x2="18" y2="18.5" class="line"/>
</svg>
